# API_CONTRACT.md

## Endpoints

---

### 1. Get KPIs for Dashboard

| Method | Path        | Auth Required | Request Body | Response Status | Response Schema |
|--------|-------------|---------------|--------------|----------------|----------------|
| GET    | /api/kpis   | yes           | None         | 200 OK         | KPIResponse    |

#### Response Schema: `KPIResponse`
| Field                  | Type                                                      |
|------------------------|-----------------------------------------------------------|
| total_ordenes          | int                                                       |
| total_unidades         | int                                                       |
| ordenes_pendientes     | int                                                       |
| ordenes_entregadas     | int                                                       |
| despachos_por_planta   | List[{"planta_id": int, "total_despachos": int}]          |
| despachos_por_centro   | List[{"centro_id": int, "total_despachos": int}]          |

---

### 2. List Ordenes

| Method | Path           | Auth Required | Request Body | Response Status | Response Schema |
|--------|----------------|---------------|--------------|----------------|----------------|
| GET    | /api/ordenes   | yes           | None         | 200 OK         | List[Orden]    |

#### Response Schema: `Orden`
| Field           | Type    |
|-----------------|---------|
| id              | int     |
| planta_id       | int     |
| centro_id       | int     |
| usuario_id      | int     |
| estado          | str     |
| unidades        | int     |
| fecha_creacion  | date    |
| fecha_entrega   | date    |

---

### 3. Create Orden

| Method | Path           | Auth Required | Request Body Schema                                                                                                   | Response Status | Response Schema |
|--------|----------------|---------------|----------------------------------------------------------------------------------------------------------------------|----------------|----------------|
| POST   | /api/ordenes   | yes           | planta_id: int<br>centro_id: int<br>usuario_id: int<br>estado: str<br>unidades: int<br>fecha_creacion: date<br>fecha_entrega: date | 201 Created    | Orden          |

#### Request Body Example
```json
{
  "planta_id": 1,
  "centro_id": 2,
  "usuario_id": 3,
  "estado": "pendiente",
  "unidades": 100,
  "fecha_creacion": "2024-06-01",
  "fecha_entrega": "2024-06-05"
}
```

#### Response Schema: `Orden`
| Field           | Type    |
|-----------------|---------|
| id              | int     |
| planta_id       | int     |
| centro_id       | int     |
| usuario_id      | int     |
| estado          | str     |
| unidades        | int     |
| fecha_creacion  | date    |
| fecha_entrega   | date    |

