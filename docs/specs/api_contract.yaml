# API_CONTRACT.md

---

## Auth Service

### POST /auth/login

| Property         | Value                |
|------------------|---------------------|
| HTTP Method      | POST                |
| Path             | /auth/login         |
| Auth Required    | No                  |
| Request Body     | `AuthRequest`       |
| Response Body    | `AuthResponse`      |
| Status Codes     | 200                 |

#### Request Body: AuthRequest

| Field    | Type     | Required |
|----------|----------|----------|
| email    | string   | Yes      |
| password | string   | Yes      |

#### Response Body: AuthResponse

| Field | Type   |
|-------|--------|
| token | string |
| user  | User   |

---

### GET /auth/me

| Property         | Value                |
|------------------|---------------------|
| HTTP Method      | GET                 |
| Path             | /auth/me            |
| Auth Required    | Yes (Bearer token)  |
| Request Body     | None                |
| Response Body    | `User`              |
| Status Codes     | 200                 |

#### Response Body: User

| Field         | Type                              |
|---------------|-----------------------------------|
| id            | string                            |
| email         | string                            |
| password_hash | string                            |
| role          | 'admin' \| 'operator' \| 'viewer' |

---

## Order Service

### POST /orders

| Property         | Value                |
|------------------|---------------------|
| HTTP Method      | POST                |
| Path             | /orders             |
| Auth Required    | Yes (Bearer token)  |
| Request Body     | `CreateOrderRequest`|
| Response Body    | `CreateOrderResponse`|
| Status Codes     | 201                 |

#### Request Body: CreateOrderRequest

| Field                  | Type     | Required |
|------------------------|----------|----------|
| plant_id               | string   | Yes      |
| distribution_center_id | string   | Yes      |
| items                  | array of objects | Yes |

Each item in `items`:

| Field        | Type     | Required |
|--------------|----------|----------|
| product_name | string   | Yes      |
| quantity     | number   | Yes      |
| unit_price   | number   | Yes      |

#### Response Body: CreateOrderResponse

| Field | Type   |
|-------|--------|
| order | Order  |

