## Data Schemas

### User

| Field         | Type                              |
|---------------|-----------------------------------|
| id            | string                            |
| email         | string                            |
| password_hash | string                            |
| role          | 'admin' \| 'operator' \| 'viewer' |

### Plant

| Field    | Type   |
|----------|--------|
| id       | string |
| name     | string |
| location | string |

### DistributionCenter

| Field   | Type   |
|---------|--------|
| id      | string |
| name    | string |
| address | string |

### Order

| Field                  | Type                                   |
|------------------------|----------------------------------------|
| id                     | string                                 |
| user_id                | string                                 |
| plant_id               | string                                 |
| distribution_center_id | string                                 |
| status                 | 'pending' \| 'processing' \| 'completed' \| 'cancelled' |
| created_at             | string (ISO 8601 datetime)             |
| updated_at             | string (ISO 8601 datetime)             |
| items                  | OrderItem array                        |

### OrderItem

| Field        | Type   |
|--------------|--------|
| id           | string |
| order_id     | string |
| product_name | string |
| quantity     | number |
| unit_price   | number |

