version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: distroviz_postgres
    environment:
      POSTGRES_DB: distroviz
      POSTGRES_USER: distroviz_user
      POSTGRES_PASSWORD: supersecret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U distroviz_user -d distroviz"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: distroviz_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-alpine
    container_name: distroviz_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    container_name: distroviz_auth
    ports:
      - "8001:8001"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: distroviz
      POSTGRES_USER: distroviz_user
      POSTGRES_PASSWORD: supersecret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      JWT_SECRET: myjwtsecret
      AUTH_SERVICE_PORT: 8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: .
      dockerfile: backend/order-service/Dockerfile
    container_name: distroviz_order
    ports:
      - "8002:8002"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: distroviz
      POSTGRES_USER: distroviz_user
      POSTGRES_PASSWORD: supersecret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      JWT_SECRET: myjwtsecret
      ORDER_SERVICE_PORT: 8002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  plant-service:
    build:
      context: .
      dockerfile: backend/plant-service/Dockerfile
    container_name: distroviz_plant
    ports:
      - "8003:8003"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: distroviz
      POSTGRES_USER: distroviz_user
      POSTGRES_PASSWORD: supersecret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: myjwtsecret
      PLANT_SERVICE_PORT: 8003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  distribution-service:
    build:
      context: .
      dockerfile: backend/distribution-service/Dockerfile
    container_name: distroviz_distribution
    ports:
      - "8004:8004"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: distroviz
      POSTGRES_USER: distroviz_user
      POSTGRES_PASSWORD: supersecret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: myjwtsecret
      DISTRIBUTION_SERVICE_PORT: 8004
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-worker:
    build:
      context: .
      dockerfile: backend/order-worker/Dockerfile
    container_name: distroviz_worker
    ports:
      - "8005:8005"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: distroviz
      POSTGRES_USER: distroviz_user
      POSTGRES_PASSWORD: supersecret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      ORDER_WORKER_PORT: 8005
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8005/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: distroviz_frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://auth-service:8001
    depends_on:
      - auth-service
      - order-service
      - plant-service
      - distribution-service
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: